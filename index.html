<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no,maximum-scale=1">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#bfe6f7">
<title>대한민국 응원 패널티킥 | 여수식자재마트 어항단지점</title>
<style>
:root{
  --ink:#2b2b2b;
  --sky1:#bfe6f7; --sky2:#e3f4fb;
  --stand1:#7fb8cd; --stand2:#9ccadb; --stand3:#b4d9e6;
  --grass1:#6cc24a; --grass2:#5cb23c; --grass3:#79cc57;
  --orange:#fb8c2a; --orange-d:#e06d12; --orange-l:#ffa94d;
  --brown:#a06a3a; --cream:#f7d9a8; --cream-l:#fdeecb;
  --mint1:#dcf6e4; --mint2:#aae9c0; --mint3:#8fe0ac;
  --redK:#e8443a;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;-webkit-user-select:none;user-select:none}
html,body{width:100%;height:100%;overflow:hidden;font-family:-apple-system,'Apple SD Gothic Neo','Noto Sans KR',sans-serif;background:#bfe6f7}

.layer{position:fixed;top:0;left:0;width:100%;height:100%;display:none;flex-direction:column}
@keyframes fadeUp{0%{opacity:0;transform:translateY(16px)}100%{opacity:1;transform:translateY(0)}}

/* ════════════ START ════════════ */
#s-start{
  background:linear-gradient(170deg,#16233f 0%,#0d1830 100%);
  flex-direction:column;align-items:center;justify-content:flex-start;
  padding:0;overflow:hidden;
}
.start-header{flex:0 0 auto;width:100%;text-align:center;padding:calc(env(safe-area-inset-top) + 16px) 18px 6px;z-index:2}
.start-header>*{opacity:0;animation:fadeUp .5s cubic-bezier(.2,.9,.3,1) forwards}
.start-header>*:nth-child(1){animation-delay:.05s}
.start-header>*:nth-child(2){animation-delay:.15s}
.start-header>*:nth-child(3){animation-delay:.25s}
.start-header .kbadge{background:rgba(255,255,255,.95);color:#16447e;border-color:rgba(255,255,255,.4);margin-bottom:9px}
.store-name2{font-size:1.5rem;font-weight:900;color:#fff;letter-spacing:-.02em;text-shadow:0 2px 6px rgba(0,0,0,.45)}
.store-name2 b{color:#ffd24a}
.store-sub{margin-top:4px;font-size:.86rem;font-weight:700;color:#bcd0ea}
.start-poster{flex:1 1 auto;width:100%;min-height:0;object-fit:contain;z-index:1}
#btn-start{position:static;width:auto;align-self:stretch;flex:0 0 auto;margin:8px 22px calc(env(safe-area-inset-bottom) + 16px)}
.start-top{padding:6vh 24px 0;text-align:center;z-index:2;position:relative}
.start-top>*{opacity:0;animation:fadeUp .55s cubic-bezier(.2,.9,.3,1) forwards}
.start-top>*:nth-child(1){animation-delay:.05s}
.start-top>*:nth-child(2){animation-delay:.14s}
.start-top>*:nth-child(3){animation-delay:.22s}
.start-top>*:nth-child(4){animation-delay:.32s}
.start-top>*:nth-child(5){animation-delay:.42s}
.start-top>*:nth-child(6){animation-delay:.5s}
.start-top>*:nth-child(7){animation-delay:.58s}
.kbadge{display:inline-flex;align-items:center;gap:6px;background:rgba(255,255,255,.6);border:2px solid rgba(43,43,43,.12);border-radius:100px;padding:5px 14px;font-size:.78rem;font-weight:800;color:#2b6b3a;margin-bottom:14px}
/* 마트 간판 락업 — 홍보 주인공 */
.store-name{font-size:2.35rem;font-weight:900;color:var(--orange-d);letter-spacing:-.03em;line-height:1.05;text-shadow:0 2px 0 rgba(255,255,255,.55)}
.store-branch{display:inline-block;margin-top:9px;background:var(--ink);color:#fff;font-size:.95rem;font-weight:800;border-radius:100px;padding:5px 20px;letter-spacing:.06em}
.fighting{font-family:'Arial Black','Arial',sans-serif;font-style:italic;font-weight:900;color:var(--ink);line-height:.92;letter-spacing:-.01em;transform:skewX(-7deg)}
.fighting.sm{margin-top:15px}
.fighting.sm .l1{font-size:1.4rem;display:block}
.start-desc{margin-top:13px;font-size:1.02rem;font-weight:800;color:#444;line-height:1.5}
.start-desc .hl{color:var(--orange-d)}
.start-date{margin-top:4px;font-size:.92rem;font-weight:800;color:#2b6b3a}
.start-humor{margin-top:10px;font-size:.8rem;font-weight:700;color:#587f63;opacity:.9}

.start-illust{position:absolute;left:0;right:0;bottom:0;height:56%;z-index:1}
.si-ball{position:absolute;left:8%;top:30%;width:88px;height:88px;animation:floaty 3s ease-in-out infinite}
.si-keeper{position:absolute;right:-4%;bottom:6%;width:62%;max-width:300px;transform:rotate(8deg);animation:floaty 3.4s ease-in-out infinite}
.dash{position:absolute;border-radius:100px;background:#7fce93;opacity:.8}
.fgro{position:absolute;z-index:2;pointer-events:none;filter:drop-shadow(0 4px 6px rgba(0,0,0,.14));animation:floaty 3.2s ease-in-out infinite}
@keyframes floaty{0%,100%{transform:translateY(0) rotate(0)}50%{transform:translateY(-12px) rotate(4deg)}}

.btn-dark{
  position:absolute;left:24px;right:24px;bottom:5vh;z-index:5;overflow:hidden;
  background:linear-gradient(180deg,var(--orange) 0%,var(--orange-d) 100%);color:#fff;border:none;border-radius:18px;
  padding:19px;font-size:1.18rem;font-weight:800;cursor:pointer;
  box-shadow:0 8px 20px rgba(224,109,18,.4);touch-action:manipulation;
}
.btn-dark::after{content:'';position:absolute;top:0;left:-60%;width:40%;height:100%;background:linear-gradient(100deg,transparent,rgba(255,255,255,.4),transparent);animation:shine 2.8s ease-in-out infinite}
@keyframes shine{0%{left:-60%}55%,100%{left:130%}}
.btn-dark:active{transform:scale(.97)}

/* ════════════ GAME ════════════ */
#s-game{flex-direction:column;align-items:stretch;background:var(--sky1)}

/* HUD */
.hud{
  flex:0 0 auto;display:flex;align-items:center;justify-content:space-between;
  padding:14px 18px 8px;z-index:30;position:relative;
}
.hud-pill{display:flex;align-items:center;gap:8px;background:rgba(255,255,255,.75);border-radius:100px;padding:6px 14px 6px 8px;box-shadow:0 2px 8px rgba(0,0,0,.08)}
.hud-pill .pico{width:26px;height:26px}
.hud-pill .ptxt{font-size:.95rem;font-weight:900;color:var(--ink)}
.hud-score{font-size:.95rem;font-weight:800;color:var(--ink)}

/* Stage */
.stage{position:relative;flex:1 1 auto;width:100%;overflow:hidden}

/* Sky + stands */
.sky{position:absolute;top:0;left:0;right:0;height:60%;background:linear-gradient(180deg,var(--sky1) 0%,var(--sky2) 100%);overflow:hidden}
.stands{position:absolute;left:-5%;right:-5%;top:14%;height:34%;border-radius:0 0 50% 50%/0 0 16% 16%}
.stands .band{position:absolute;left:0;right:0;border-radius:50%/100%}
/* 식자재 관중단 — 파도타기 응원 */
.crowd-row{position:absolute;left:2%;right:2%;display:flex;justify-content:space-around;pointer-events:none;z-index:2}
.crowd-row span{font-size:13px;line-height:1;animation:crowdBob 2.4s ease-in-out infinite;filter:drop-shadow(0 1px 1px rgba(0,0,0,.18))}
@keyframes crowdBob{0%,100%{transform:translateY(0)}50%{transform:translateY(-4px)}}
.sky.hype .crowd-row span{animation:crowdHype .5s ease-in-out infinite}
@keyframes crowdHype{0%,100%{transform:translateY(0) scale(1)}50%{transform:translateY(-10px) scale(1.2)}}
.cloud{position:absolute;background:#fff;border-radius:100px;opacity:.9}
.flag{position:absolute;width:0;height:0;border-style:solid;animation:flagWave 1.7s ease-in-out infinite;transform-origin:left center}
@keyframes flagWave{0%,100%{transform:skewY(0)}50%{transform:skewY(9deg)}}
.spark4{position:absolute;color:#fff;font-size:14px;opacity:.9;pointer-events:none;animation:twinkle 2.2s ease-in-out infinite}
@keyframes twinkle{0%,100%{opacity:.9;transform:scale(1)}50%{opacity:.3;transform:scale(.6)}}
.flood{position:absolute;top:6%;width:74px}
.flood .pole{position:absolute;left:50%;top:38px;width:5px;height:60px;background:#9bb0bc;transform:translateX(-50%);border-radius:3px}
.flood .panel{position:relative;width:74px;height:42px;background:#eef6fa;border:2px solid #b9d2dd;border-radius:8px;display:grid;grid-template-columns:repeat(3,1fr);grid-template-rows:repeat(2,1fr);gap:3px;padding:5px;box-shadow:0 0 18px rgba(255,255,255,.7)}
.flood .panel i{background:#fff;border-radius:50%;box-shadow:0 0 4px rgba(255,255,150,.9);transition:box-shadow .3s}
.sky.hype .flood .panel i{box-shadow:0 0 12px 4px rgba(255,255,150,1)}
.flood.left{left:3%}
.flood.right{right:3%}
.flyby{position:absolute;font-size:1.1rem;z-index:1;pointer-events:none;animation:flyAcross linear forwards}
@keyframes flyAcross{0%{transform:translateX(0) translateY(0)}25%{transform:translateX(30vw) translateY(-9px)}50%{transform:translateX(60vw) translateY(3px)}75%{transform:translateX(90vw) translateY(-7px)}100%{transform:translateX(118vw) translateY(0)}}

/* Goal */
.goalwrap{position:absolute;top:25%;left:50%;transform:translateX(-50%);width:90%;max-width:370px;z-index:4}
.goalsvg{width:100%;display:block;overflow:visible}
.netimpact{position:absolute;width:60px;height:60px;border-radius:50%;background:radial-gradient(circle,rgba(255,255,255,.7) 0%,rgba(255,255,255,0) 70%);transform:translate(-50%,-50%) scale(.2);pointer-events:none;z-index:6}

/* Keeper */
.keeper{
  position:absolute;left:50%;bottom:1%;
  width:44%;max-width:150px;z-index:5;
  transform:translateX(-50%);
  transform-origin:bottom center;
  transition:left .32s cubic-bezier(.34,1.3,.5,1),bottom .32s cubic-bezier(.34,1.3,.5,1),transform .32s cubic-bezier(.34,1.3,.5,1);
  filter:drop-shadow(0 5px 4px rgba(0,0,0,.14));
}
.keeper.idle{animation:kReady 1.55s ease-in-out infinite}
@keyframes kReady{
  0%,100%{transform:translate(-50%,0) rotate(0)}
  20%{transform:translate(calc(-50% - 8px),-5px) rotate(-2.5deg)}
  45%{transform:translate(-50%,0) rotate(0)}
  70%{transform:translate(calc(-50% + 8px),-5px) rotate(2.5deg)}
}
.keeper svg{width:100%;display:block;overflow:visible}
.keeper img{width:100%;display:block;pointer-events:none;filter:drop-shadow(0 0 2px #fff) drop-shadow(0 0 2px #fff) drop-shadow(2px 2px 0 rgba(255,255,255,.9)) drop-shadow(-2px 2px 0 rgba(255,255,255,.9))}
.keeper .kpupil{transition:transform .15s ease}
.keeper-shadow{position:absolute;left:50%;bottom:-1%;width:34%;max-width:120px;height:15px;background:rgba(0,0,0,.16);border-radius:50%;transform:translateX(-50%);z-index:3;filter:blur(2px);transition:all .32s ease}

/* Field */
.field{position:absolute;left:0;right:0;bottom:0;height:44%;overflow:hidden;background:var(--grass1)}
.field .stripe{position:absolute;left:-10%;right:-10%;height:40%}
.fieldline{position:absolute;left:0;right:0;height:5px;background:#eafae4;border-radius:4px;opacity:.85}
.pkspot{position:absolute;left:50%;top:26%;width:14px;height:7px;background:#eafae4;border-radius:50%;transform:translateX(-50%);opacity:.8}
.tuft{position:absolute;color:var(--grass2);font-weight:900;font-size:13px;opacity:.55;pointer-events:none;line-height:1;animation:tuftSway 3.4s ease-in-out infinite}
@keyframes tuftSway{0%,100%{transform:rotate(-4deg)}50%{transform:rotate(5deg)}}

/* 경기장 펜스 광고보드 — 마트 홍보 */
.adboard{position:absolute;left:-1%;right:-1%;top:51.2%;height:4.6%;display:flex;gap:6px;z-index:2;padding:0 4px}
.adboard .ap{flex:1 0 auto;display:flex;align-items:center;justify-content:center;background:#fff;border:2.5px solid var(--ink);border-radius:9px;font-size:.7rem;font-weight:900;color:var(--orange-d);white-space:nowrap;padding:0 12px;box-shadow:0 3px 0 rgba(0,0,0,.13)}
.adboard .ap.alt{background:linear-gradient(180deg,var(--orange) 0%,var(--orange-d) 100%);color:#fff}

/* Ball (watermelon) */
.ball{position:absolute;left:50%;top:70%;width:74px;height:74px;transform:translate(-50%,-50%);z-index:8;pointer-events:none}
.ball svg{width:100%;height:100%;display:block;overflow:visible}
.ball.glow{filter:drop-shadow(0 0 10px rgba(255,255,120,.9)) drop-shadow(0 0 18px rgba(120,220,90,.6));animation:ballpulse 1.1s ease-in-out infinite}
@keyframes ballpulse{0%,100%{transform:translate(-50%,-50%) scale(1)}50%{transform:translate(-50%,-50%) scale(1.06)}}
.trail{position:fixed;border-radius:50%;background:radial-gradient(circle,rgba(255,255,255,.85),rgba(255,255,255,0) 70%);pointer-events:none;z-index:45;transform:translate(-50%,-50%);animation:trailFade .32s linear forwards}
@keyframes trailFade{to{opacity:0;transform:translate(-50%,-50%) scale(.25)}}

/* Aim zones */
.aimgrid{position:absolute;top:25%;left:50%;transform:translateX(-50%);width:90%;max-width:370px;z-index:7;pointer-events:none}
.aimgrid .inner{position:absolute;left:6%;right:6%;top:14%;bottom:6%;display:grid;grid-template-columns:repeat(3,1fr);grid-template-rows:repeat(3,1fr)}
.az{border-radius:8px;transition:background .1s,box-shadow .1s;margin:2px}
.az.on{background:rgba(255,205,60,.4);box-shadow:inset 0 0 14px rgba(255,180,30,.65)}

/* Slingshot aim: trajectory dots + target ring */
.tdot{position:fixed;border-radius:50%;background:rgba(255,255,255,.95);border:2px solid rgba(43,43,43,.18);z-index:24;pointer-events:none;transform:translate(-50%,-50%);box-shadow:0 2px 6px rgba(0,0,0,.14)}
#aimRing{position:fixed;width:56px;height:56px;border:4px dashed rgba(255,255,255,.95);border-radius:50%;transform:translate(-50%,-50%);z-index:24;pointer-events:none;display:none;animation:aimSpin 1.3s linear infinite;box-shadow:0 0 16px rgba(255,230,120,.7),inset 0 0 12px rgba(255,230,120,.4)}
@keyframes aimSpin{to{transform:translate(-50%,-50%) rotate(360deg)}}

.inst{position:absolute;left:0;right:0;bottom:5%;text-align:center;font-size:1.02rem;font-weight:800;color:#fff;text-shadow:0 2px 5px rgba(0,0,0,.35);z-index:9;pointer-events:none;animation:instFloat 1.7s ease-in-out infinite;transition:opacity .25s}
@keyframes instFloat{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}
.swipe{position:absolute;inset:0;z-index:25;touch-action:none}

.sdash{position:absolute;background:#fff;border-radius:100px;z-index:8;pointer-events:none;opacity:.9}

#beam{position:absolute;height:18px;border-radius:100px;transform-origin:left center;z-index:6;pointer-events:none;opacity:0;
  background:linear-gradient(90deg,rgba(255,255,255,0) 0%,rgba(180,240,150,.55) 60%,rgba(255,255,150,.8) 100%);}

/* GOAL watermark — gold gradient */
#goalText{
  position:absolute;top:24%;left:50%;transform:translate(-50%,-50%) skewX(-7deg) scale(.4);
  font-family:'Arial Black','Arial',sans-serif;font-style:italic;font-weight:900;
  font-size:clamp(3.2rem,16vw,5.2rem);z-index:40;opacity:0;pointer-events:none;white-space:nowrap;
  background:linear-gradient(180deg,#fff 0%,#ffe27a 45%,#f59f00 100%);
  -webkit-background-clip:text;background-clip:text;color:transparent;
  -webkit-text-stroke:2.5px var(--ink);
  filter:drop-shadow(0 6px 0 rgba(0,0,0,.18));
}
#goalText.show{animation:goalPop .5s cubic-bezier(.2,1.4,.4,1) forwards}
@keyframes goalPop{0%{opacity:0;transform:translate(-50%,-50%) skewX(-7deg) scale(.28) rotate(-8deg)}55%{opacity:1;transform:translate(-50%,-50%) skewX(-7deg) scale(1.26) rotate(3deg)}75%{transform:translate(-50%,-50%) skewX(-7deg) scale(.96) rotate(-1deg)}100%{opacity:.96;transform:translate(-50%,-50%) skewX(-7deg) scale(1.05) rotate(0)}}

.emote{position:absolute;font-size:1.6rem;z-index:9;pointer-events:none;opacity:0}
.emote.show{animation:emoteUp 1s ease forwards}
@keyframes emoteUp{0%{opacity:0;transform:translateY(8px) scale(.5)}30%{opacity:1;transform:translateY(-4px) scale(1.1)}100%{opacity:0;transform:translateY(-26px) scale(1)}}

/* ════════════ PRIZE REVEAL (대공개 시퀀스) ════════════ */
#reveal{position:fixed;inset:0;z-index:80;display:none;align-items:center;justify-content:center;flex-direction:column;
  background:radial-gradient(circle at 50% 42%,rgba(52,28,76,.82) 0%,rgba(12,7,28,.94) 75%);
  opacity:0;transition:opacity .28s ease;overflow:hidden}
.rv-rays{position:absolute;left:50%;top:42%;width:150vmax;height:150vmax;max-width:1200px;max-height:1200px;transform:translate(-50%,-50%);
  background:repeating-conic-gradient(rgba(255,218,90,.16) 0 11deg,transparent 11deg 24deg);
  animation:raysSpin 9s linear infinite;border-radius:50%;will-change:transform}
@keyframes raysSpin{to{transform:translate(-50%,-50%) rotate(360deg)}}
.rv-label{position:absolute;top:17%;left:0;right:0;text-align:center;font-size:1.1rem;font-weight:900;color:#ffe9a8;letter-spacing:.34em;opacity:0;z-index:2}
.rv-label.show{animation:fadeUp .5s ease forwards}
.rv-emoji{font-size:7.4rem;line-height:1.15;opacity:0;z-index:2;filter:drop-shadow(0 16px 30px rgba(0,0,0,.5))}
.rv-emoji.slam{animation:slamIn .55s cubic-bezier(.18,1.5,.4,1) forwards}
@keyframes slamIn{0%{opacity:0;transform:scale(6.5) rotate(-20deg)}55%{opacity:1;transform:scale(.9) rotate(3deg)}75%{transform:scale(1.07) rotate(-1deg)}100%{opacity:1;transform:scale(1) rotate(0)}}
.rv-ring{position:absolute;left:50%;top:42%;width:60px;height:60px;border:6px solid rgba(255,235,150,.95);border-radius:50%;transform:translate(-50%,-50%);opacity:0;z-index:1}
.rv-ring.go{animation:ringOut .6s ease-out forwards}
@keyframes ringOut{0%{opacity:1;transform:translate(-50%,-50%) scale(.35)}100%{opacity:0;transform:translate(-50%,-50%) scale(13)}}
.rv-name{margin-top:20px;font-size:1.9rem;font-weight:900;color:#fff;text-shadow:0 4px 0 rgba(0,0,0,.32);opacity:0;z-index:2;text-align:center;padding:0 20px}
.rv-name.stamp{animation:stampIn .42s cubic-bezier(.2,1.7,.4,1) forwards}
@keyframes stampIn{0%{opacity:0;transform:scale(2.5) rotate(-7deg)}100%{opacity:1;transform:scale(1) rotate(0)}}
.rv-grade{margin-top:12px;background:linear-gradient(180deg,#ffd700,#f59f00);color:#5b3d00;font-weight:900;font-size:.95rem;padding:7px 24px;border-radius:100px;opacity:0;z-index:2;box-shadow:0 4px 16px rgba(245,159,0,.55)}
.rv-grade.pop{animation:stampIn .36s cubic-bezier(.2,1.7,.4,1) forwards}
.rv-tap{position:absolute;bottom:7%;left:0;right:0;text-align:center;font-size:.78rem;font-weight:700;color:rgba(255,255,255,.55);z-index:2}
#reveal.shakeit{animation:shake .32s ease}

/* ════════════ RESULT CARD ════════════ */
.card{
  position:fixed;left:0;right:0;bottom:0;z-index:60;
  background:#fff;border-radius:28px 28px 0 0;
  padding:24px 22px calc(24px + env(safe-area-inset-bottom));
  box-shadow:0 -8px 30px rgba(0,0,0,.18);
  transform:translateY(110%);transition:transform .46s cubic-bezier(.2,1.1,.3,1);
  text-align:center;
}
.card.up{transform:translateY(0)}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:7px;border-radius:28px 28px 0 0;background:linear-gradient(90deg,#fb8c2a,#ffd700,#fb8c2a)}
.card-store{display:inline-block;background:#fff3e4;color:var(--orange-d);border:1.5px solid #f5c894;font-size:.8rem;font-weight:900;border-radius:100px;padding:5px 15px;margin-bottom:10px}
.card .ctitle{font-size:1.6rem;font-weight:900;color:var(--ink);margin-bottom:12px}
.card .ctitle .hl{color:var(--orange-d)}
.prize-box{position:relative;overflow:hidden;background:#fff7ec;border:2px dashed #f0b46a;border-radius:18px;padding:14px 12px 13px;margin-bottom:12px}
.pb-rays{position:absolute;left:50%;top:46%;width:340px;height:340px;transform:translate(-50%,-50%);background:repeating-conic-gradient(rgba(251,140,42,.11) 0 14deg,transparent 14deg 30deg);animation:raysSpin 14s linear infinite;border-radius:50%;pointer-events:none}
.prize-box .cemoji,.prize-box .prize-name,.prize-box .prize-grade,.prize-box .prize-meta{position:relative;z-index:1}
.prize-box .stamp{position:absolute;top:8px;right:8px;z-index:2;width:52px;height:52px;border-radius:50%;background:#e8443a;color:#fff;display:flex;align-items:center;justify-content:center;font-size:.8rem;font-weight:900;transform:rotate(14deg);border:2.5px solid rgba(255,255,255,.85);box-shadow:0 3px 10px rgba(232,68,58,.45);letter-spacing:.04em}
.card.up .ctitle{animation:fadeUp .4s .12s ease both}
.card.up .prize-box{animation:fadeUp .4s .2s ease both}
.card.up .cmsg{animation:fadeUp .4s .3s ease both}
.card.up .humor{animation:fadeUp .4s .36s ease both}
.card.up .cemoji{animation:popSpin .5s .3s cubic-bezier(.2,1.6,.4,1) both}
@keyframes popSpin{0%{opacity:0;transform:scale(.2) rotate(-15deg)}70%{opacity:1;transform:scale(1.12) rotate(4deg)}100%{opacity:1;transform:scale(1) rotate(0)}}
.prize-box .cemoji{font-size:3.2rem;line-height:1.1}

#dim{position:fixed;inset:0;background:rgba(0,0,0,.18);z-index:55;opacity:0;transition:opacity .4s;pointer-events:none}
#dim.on{opacity:1}

/* Confetti / flash / particles */
#confetti{position:fixed;inset:0;pointer-events:none;z-index:95;overflow:hidden}
.conf{position:absolute;top:-20px;animation:cfall linear forwards}
@keyframes cfall{to{transform:translateY(115vh) rotate(900deg);opacity:0}}
#flash{position:fixed;inset:0;z-index:50;pointer-events:none;opacity:0}
@keyframes flashOut{0%{opacity:1}100%{opacity:0}}
.spark{position:fixed;border-radius:50%;pointer-events:none;z-index:85;animation:sparkOut .8s ease-out forwards}
@keyframes sparkOut{0%{transform:translate(-50%,-50%) scale(1.4);opacity:1}100%{transform:translate(calc(-50% + var(--dx)),calc(-50% + var(--dy))) scale(0);opacity:0}}
.seed{position:fixed;width:7px;height:11px;background:#2e1d10;border-radius:50%;pointer-events:none;z-index:85;animation:sparkOut .7s ease-out forwards}
/* 수박 슬라이스 연출 */
.slash{position:fixed;height:6px;border-radius:100px;pointer-events:none;z-index:86;background:linear-gradient(90deg,rgba(255,255,255,0),#fff 30%,#fff 70%,rgba(255,255,255,0));animation:slashIn .22s ease-out forwards}
@keyframes slashIn{0%{opacity:0;transform:translate(-50%,-50%) rotate(var(--ra)) scaleX(.1)}45%{opacity:1;transform:translate(-50%,-50%) rotate(var(--ra)) scaleX(1.06)}100%{opacity:0;transform:translate(-50%,-50%) rotate(var(--ra)) scaleX(1.12)}}

.chunk{position:fixed;left:0;top:0;pointer-events:none;z-index:85;border-radius:40% 60% 55% 45%;background:#ff5a64;border:2.5px solid #2b2b2b;will-change:transform,opacity}
.dust{position:fixed;width:12px;height:12px;border-radius:50%;background:rgba(214,203,180,.85);pointer-events:none;z-index:48;animation:dustOut .5s ease-out forwards}
@keyframes dustOut{0%{transform:translate(-50%,-50%) scale(.5);opacity:.9}100%{transform:translate(calc(-50% + var(--dx)),calc(-50% - 16px)) scale(1.7);opacity:0}}

@keyframes shake{0%,100%{transform:none}20%{transform:translate(-5px,2px)}40%{transform:translate(5px,-2px)}60%{transform:translate(-4px,3px)}80%{transform:translate(4px,-1px)}}
.stage.shake{animation:shake .35s ease}
/* 흔들림 강화(체감↑) */
@keyframes punchShake{0%,100%{transform:none}12%{transform:translate(-9px,4px) scale(1.045)}30%{transform:translate(10px,-5px) scale(1.05)}50%{transform:translate(-8px,5px) scale(1.035)}70%{transform:translate(6px,-3px) scale(1.02)}88%{transform:translate(-3px,1px) scale(1.01)}}
.stage.punch{animation:punchShake .46s cubic-bezier(.36,.07,.19,.97)}
@keyframes netS{0%,100%{transform:none}20%{transform:translateY(8px)}45%{transform:translateY(-4px)}70%{transform:translateY(5px)}}

/* ════ 시네마틱 슛 연출 (A) ════ */
.stage{transition:transform .52s cubic-bezier(.28,.7,.18,1)}
.stage.zoom{transform:scale(1.075);transform-origin:50% 27%}
#vignette{position:fixed;inset:0;z-index:38;pointer-events:none;opacity:0;transition:opacity .32s ease;
  background:radial-gradient(ellipse 72% 62% at 50% 30%,transparent 34%,rgba(8,4,20,.30) 78%,rgba(8,4,20,.62) 100%)}
#vignette.on{opacity:1}

/* ════ 골 충격파 링 (B) ════ */
.shock{position:fixed;border-radius:50%;border:5px solid rgba(255,255,255,.92);pointer-events:none;z-index:47;
  transform:translate(-50%,-50%) scale(.2);opacity:.95;animation:shockOut .56s cubic-bezier(.2,.8,.3,1) forwards}
@keyframes shockOut{0%{transform:translate(-50%,-50%) scale(.2);opacity:.95}100%{transform:translate(-50%,-50%) scale(3.6);opacity:0}}
.shock.gold{border-color:rgba(255,214,80,.95);box-shadow:0 0 26px rgba(255,200,60,.75)}

/* ════ 경품 공개 등급 연출 (C) ════ */
.rv-banner{position:absolute;top:8%;left:0;right:0;text-align:center;z-index:3;opacity:0;pointer-events:none}
.rv-banner span{display:inline-block;padding:9px 28px;border-radius:100px;font-size:1.08rem;font-weight:900;letter-spacing:.03em;
  background:linear-gradient(180deg,#ffe27a,#f59f00);color:#5b3d00;box-shadow:0 7px 22px rgba(245,159,0,.6),inset 0 0 0 2px rgba(255,255,255,.5)}
.rv-banner.tier2 span{background:linear-gradient(180deg,#cdebff,#5aa8e0);color:#072f4d;box-shadow:0 7px 20px rgba(70,140,210,.5),inset 0 0 0 2px rgba(255,255,255,.55)}
.rv-banner.show{animation:bannerIn .5s cubic-bezier(.2,1.5,.4,1) forwards}
@keyframes bannerIn{0%{opacity:0;transform:translateY(-20px) scale(.78)}100%{opacity:1;transform:translateY(0) scale(1)}}
#reveal.gold{background:radial-gradient(circle at 50% 42%,rgba(122,82,12,.93) 0%,rgba(40,22,4,.97) 78%)}
#reveal.gold .rv-rays{background:repeating-conic-gradient(rgba(255,210,70,.30) 0 10deg,transparent 10deg 22deg)}
.rv-emoji .rimg{transition:width .3s ease,height .3s ease}
.rv-emoji.gold .rimg{box-shadow:0 12px 34px rgba(0,0,0,.5),0 0 38px rgba(255,205,70,.85),0 0 70px rgba(255,180,40,.4)!important}

/* ════ 저사양/접근성 대응 ════ */
@media (prefers-reduced-motion:reduce){
  .stage.zoom{transform:none}
  #vignette{display:none}
  .stage.punch,.stage.shake,#reveal.shakeit,.shock{animation-duration:.2s}
}
</style>
</head>

/* ── Slingshot input ── */
let dragOn=false,pSX=0,pSY=0,baseX=0,baseY=0;
const DOT_N=7,dots=[];
(function(){for(let i=0;i<DOT_N;i++){const d=document.createElement('div');d.className='tdot';d.style.display='none';document.body.appendChild(d);dots.push(d);}})();
const aimRing=document.createElement('div');aimRing.id='aimRing';document.body.appendChild(aimRing);
function hideDots(){dots.forEach(d=>d.style.display='none');aimRing.style.display='none';}

function calcZoneFromPull(px,py){
  const W=innerWidth,H=innerHeight;
  const row=py>H*.13?0:py>H*.05?1:2;
  const col=px<-W*.09?2:px>W*.09?0:1;
  return row*3+col;
}

function updateAim(px,py){
  const dist=Math.hypot(px,py);
  const ox=Math.max(-46,Math.min(46,px*.38)), oy=Math.max(-14,Math.min(60,py*.38));
  ball.style.transition='none';
  ball.style.transform=`translate(-50%,-50%) translate(${ox}px,${oy}px) scale(${1+Math.min(dist/900,.08)}) rotate(${ox*.15}deg)`;
  if(dist<=36){hideDots();clearZone();return;}
  const z=calcZoneFromPull(px,py);
  setZone(z);
  const col=z%3,row=(z/3)|0;
  setPupils((col-1)*4,(row-1)*3);
  const[tx,ty]=zonePoint(z);
  aimRing.style.display='block';aimRing.style.left=tx+'px';aimRing.style.top=ty+'px';
  const mx=(baseX+tx)/2, my=(baseY+ty)/2-Math.min(110,Math.hypot(tx-baseX,ty-baseY)*.22);
  for(let i=0;i<DOT_N;i++){
    const t=.14+.74*i/(DOT_N-1);
    const x=(1-t)*(1-t)*baseX+2*(1-t)*t*mx+t*t*tx;
    const y=(1-t)*(1-t)*baseY+2*(1-t)*t*my+t*t*ty;
    const s=13-7*i/(DOT_N-1);
    const d=dots[i];d.style.display='block';
    d.style.left=x+'px';d.style.top=y+'px';d.style.width=s+'px';d.style.height=s+'px';
    d.style.opacity=String(.95-.45*i/(DOT_N-1));
  }
}

function dragStart(x,y){
  if(shooting||LOCKED)return;
  dragOn=true;pSX=x;pSY=y;

/* ───────── Audio (Web Audio 합성) ───────── */
function initAudio(){try{if(!actx)actx=new(window.AudioContext||window.webkitAudioContext)();if(actx.state==='suspended')actx.resume();}catch(e){}}
function beep(f,d,t,v){try{initAudio();const o=actx.createOscillator(),g=actx.createGain();o.connect(g);g.connect(actx.destination);o.type=t||'sine';o.frequency.setValueAtTime(f,actx.currentTime);o.frequency.exponentialRampToValueAtTime(f*.3,actx.currentTime+d);g.gain.setValueAtTime(v||.6,actx.currentTime);g.gain.exponentialRampToValueAtTime(.001,actx.currentTime+d);o.start();o.stop(actx.currentTime+d);}catch(e){}}
function noiseBuf(dur){const b=actx.createBuffer(1,actx.sampleRate*dur,actx.sampleRate);const d=b.getChannelData(0);for(let i=0;i<d.length;i++)d[i]=(Math.random()*2-1)*(1-i/d.length);return b;}
function tick(v,fq){try{initAudio();const s=actx.createBufferSource();s.buffer=noiseBuf(.05);const f=actx.createBiquadFilter();f.type='highpass';f.frequency.value=fq||900;const g=actx.createGain();g.gain.value=v;s.connect(f);f.connect(g);g.connect(actx.destination);s.start();}catch(e){}}
function sndPop(){beep(880,.07,'sine',.25);}
function sndKick(){beep(170,.12,'sine',.7);tick(.3,500);}
function sndSwish(){try{initAudio();const s=actx.createBufferSource();s.buffer=noiseBuf(.16);const f=actx.createBiquadFilter();f.type='lowpass';f.frequency.value=1400;const g=actx.createGain();g.gain.value=.5;s.connect(f);f.connect(g);g.connect(actx.destination);s.start();}catch(e){}}
function sndGoal(){[523,659,784,1047,1319].forEach((f,i)=>setTimeout(()=>beep(f,.18,'triangle',.4),i*75));}
function sndCheer(){try{
  initAudio();const dur=1.9;
  const src=actx.createBufferSource();
  const b=actx.createBuffer(1,actx.sampleRate*dur,actx.sampleRate);
  const d=b.getChannelData(0);
  for(let i=0;i<d.length;i++){d[i]=(Math.random()*2-1)*Math.pow(Math.sin(Math.PI*i/d.length),1.6);}
  src.buffer=b;
  const f=actx.createBiquadFilter();f.type='bandpass';f.frequency.value=1050;f.Q.value=.7;
  const g=actx.createGain();
  g.gain.setValueAtTime(.0001,actx.currentTime);
  g.gain.exponentialRampToValueAtTime(.5,actx.currentTime+.25);
  g.gain.exponentialRampToValueAtTime(.001,actx.currentTime+dur);
  src.connect(f);f.connect(g);g.connect(actx.destination);src.start();
}catch(e){}}
function sndDrum(){let t=0,dt=130;for(let i=0;i<30;i++){setTimeout(()=>tick(.22,1100),t);t+=dt;dt=Math.max(40,dt*0.92);}} /* ~1.8초 가속 드럼롤(2초 서스펜스 채움) */
function sndBoom(){beep(70,.5,'sine',.95);tick(.5,300);}
function sndThud(){beep(85,.14,'sine',.7);tick(.25,420);}
function sndSplat(){beep(150,.2,'sine',.6);tick(.45,600);tick(.3,1300);}
function sndTada(){
  [523,659,784,1047].forEach((f,i)=>setTimeout(()=>{beep(f,.3,'triangle',.42);beep(f/2,.3,'square',.1);},i*90));

/* Ball flight + 잔상 트레일 */
function flyBall(zone){
  const bR=ball.getBoundingClientRect();
  const sx2=bR.left+bR.width/2, sy2=bR.top+bR.height/2;
  const [tpx,tpy]=zonePoint(zone);
  const ang=Math.atan2(tpy-sy2,tpx-sx2)*180/Math.PI;
  const len=Math.hypot(tpx-sx2,tpy-sy2);
  beam.style.left=sx2+'px';beam.style.top=sy2+'px';beam.style.width=len+'px';
  beam.style.transform=`rotate(${ang}deg)`;
  beam.style.opacity='1';beam.style.transition='opacity .5s ease .15s';
  setTimeout(()=>beam.style.opacity='0',150);

  const sh=document.createElement('div');
  sh.style.cssText=`position:fixed;left:${sx2}px;top:${sy2}px;width:52px;height:15px;border-radius:50%;background:rgba(0,0,0,.22);transform:translate(-50%,-50%);z-index:7;pointer-events:none;filter:blur(2px)`;
  document.body.appendChild(sh);
  const g=document.createElement('div');
  g.style.cssText=`position:fixed;left:${sx2}px;top:${sy2}px;width:64px;height:64px;transform:translate(-50%,-50%);z-index:46;pointer-events:none;filter:drop-shadow(0 4px 6px rgba(0,0,0,.35))`;
  g.innerHTML=wmSVG();document.body.appendChild(g);
  ball.style.opacity='0';
  const dx=tpx-sx2,dy=tpy-sy2,groundY=sy2;

  const dur=660,arc=Math.min(70,Math.abs(dy)*.3+38),t0=performance.now();  /* 살짝 늘려 슬로모션 체감 (A) */
  let fr=0;
  (function step(t){
    const p=Math.min((t-t0)/dur,1);
    const px=1-Math.pow(1-p,2.4),py=1-Math.pow(1-p,2.1);  /* 골 직전 감속 강화 */
    const h=arc*Math.sin(Math.PI*p);
    const cx=sx2+dx*px,cy=sy2+dy*py-h;
    g.style.left=cx+'px';g.style.top=cy+'px';
    g.style.transform=`translate(-50%,-50%) scale(${1-.42*p}) rotate(${p*640}deg)`;
    if(++fr%3===0&&p<.9){
      const tr=document.createElement('div');tr.className='trail';
      const ts=46*(1-.4*p);
      tr.style.cssText+=`left:${cx}px;top:${cy}px;width:${ts}px;height:${ts}px`;
      document.body.appendChild(tr);setTimeout(()=>tr.remove(),340);
    }
    sh.style.left=cx+'px';sh.style.top=(groundY+dy*py)+'px';
    const ss=(1-.5*p)*(1-Math.min(h/160,.7));sh.style.transform=`translate(-50%,-50%) scale(${Math.max(ss,.1)})`;sh.style.opacity=String(.22*(1-p*.5));
    if(p<1)requestAnimationFrame(step);
    else{
      sh.remove();sndSwish();stickBallInNet(g,zone);
      setTimeout(()=>slicePop(g,zone),140); /* hit-stop → 차차착 슬라이스 */
    }
  })(performance.now());
}

function slicePop(g,zone){

/* 수박 조각 포물선 비산 (중력 물리) */
function melonBurst(cx,cy){
  const ps=[];
  for(let i=0;i<13;i++){
    const isEmo=i<8;
    const el=document.createElement('div');
    el.className=isEmo?'piece':'chunk';
    if(isEmo){el.textContent='🍉';el.style.fontSize=(19+Math.random()*13)+'px';}
    else{const s=9+Math.random()*8;el.style.width=s+'px';el.style.height=(s*.8)+'px';}
    document.body.appendChild(el);
    const a=-Math.PI*(0.12+0.76*Math.random());      /* 위쪽 반구로 발사 */
    const sp=250+Math.random()*430;
    ps.push({el,x:cx,y:cy,vx:Math.cos(a)*sp*(Math.random()<.5?-1:1),vy:Math.sin(a)*sp,rot:Math.random()*360,vr:(Math.random()-.5)*760});
  }
  const t0=performance.now();let last=t0;
  (function st(t){
    const dt=Math.min((t-last)/1000,.05);last=t;
    const life=(t-t0)/950;
    ps.forEach(p=>{
      p.vy+=1500*dt;p.x+=p.vx*dt;p.y+=p.vy*dt;p.rot+=p.vr*dt;
      p.el.style.transform=`translate(${p.x-14}px,${p.y-14}px) rotate(${p.rot}deg)`;
      p.el.style.opacity=life>.72?String(Math.max(1-(life-.72)/.28,0)):'1';
    });
    if(life<1)requestAnimationFrame(st);
    else ps.forEach(p=>p.el.remove());
  })(t0);
}

  const imgSz=tier>=3?210:tier>=2?186:172;
  rvE.innerHTML='';var _rim=new Image();_rim.className='rimg';
  _rim.style.cssText=`width:${imgSz}px;height:${imgSz}px;object-fit:contain;background:#fff;border-radius:16px;padding:8px;box-shadow:0 10px 26px rgba(0,0,0,.45);display:block`;
  _rim.onerror=function(){rvE.textContent=rec.e;};
  _rim.src='prizes/'+encodeURIComponent(rec.n)+'.jpg';rvE.appendChild(_rim);
  /* 우수/최고급 배너 (C) */
  if(tier>=2){
    rvB.className='rv-banner'+(tier>=3?'':' tier2');
    rvB.firstElementChild.textContent=(tier>=3?'🏆 ':'✨ ')+(rec.g||'')+' 경품 당첨!';
    T(()=>rvB.classList.add('show'),200);
  }
  if(tier>=2)sndBoom(); else sndPop();
  vib(tier>=3?[25,40,90]:tier>=2?[20,50]:[15]);
  if(tier>=2){reveal.classList.add('shakeit');T(()=>reveal.classList.remove('shakeit'),330);}
  const col=tier>=3?['#FFD700','#fff','#ffe27a','#ffab40','#ff5a5a']:tier>=2?['#FFD700','#fff','#ffe27a']:['#ffe27a','#fff'];
  burstAt(innerWidth/2,innerHeight*.42,col,tier>=3?34:tier>=2?20:12,60,tier>=3?230:tier>=2?150:110);
  if(tier>=3)flashGold();
  T(()=>{rvN.textContent=rec.n;rvN.classList.add('stamp');sndTada();},360);
  T(()=>{rvG.textContent=rec.g;rvG.classList.add('pop');if(tier>=2)confetti(tier>=3?110:55);},640);
  if(tier>=3){T(()=>{flashGold();burstAt(innerWidth/2,innerHeight*.42,col,26,80,240);},760);T(()=>confetti(80),1300);}
  T(finishReveal,tier>=3?2050:1500);
}

function revealAbort(){rvTimers.forEach(clearTimeout);rvTimers=[];rvDone=null;reveal.style.opacity='0';setTimeout(()=>{reveal.style.display='none';},300);}
function finishReveal(){
  rvTimers.forEach(clearTimeout);rvTimers=[];
  reveal.style.opacity='0';
  setTimeout(()=>{reveal.style.display='none';},300);
  if(rvDone){const d=rvDone;rvDone=null;setTimeout(d,180);}
}
reveal.addEventListener('click',()=>{if(rvDone)finishReveal();});

/* ───────── Result: 서버 추첨(공유 재고) 또는 로컬 예시풀 ───────── */
async function result(zone){
  revealStart();
  let rec=null, state='ok', lock=false;
  if(TEST){
    const p=drawPrize(); rec={e:p.e,n:p.n,g:p.g,tier:p.tier||1,t:Date.now(),c:mkCode()};
    try{new Image().src='prizes/'+encodeURIComponent(rec.n)+'.jpg';}catch(e){}
    await sleep(760);
  }else{
    const d=await (drawP||drawServer()); drawP=null;
    if(d&&d.name){try{new Image().src='prizes/'+encodeURIComponent(d.name)+'.jpg';}catch(e){}} /* 공개 전 사진 미리 로드 */
    await sleep(2000); /* 링 서스펜스 2초(그 동안 추첨·사진 로딩 끝) */
    if(!d) state='err';
    else if(d.soldout) state='sold';
    else { rec={e:d.emoji,n:d.name,g:d.grade,tier:Number(d.tier)||1,t:Date.now(),c:d.code}; lock=!!d.lock; }
  }
  if(state==='err'){revealAbort();showSpecialCard('네트워크 오류 ⚠️','연결을 확인하고<br>다시 시도해 주세요.',true);return;}
  if(state==='sold'){revealAbort();showSpecialCard('오늘은 <span class="hl">마감</span>됐어요 🙏','준비된 경품이 모두 소진됐습니다.<br>다음 기회에 또 도전해 주세요!',TEST);return;}
  if(lock){try{localStorage.setItem(PKEY,JSON.stringify(rec));}catch(e){}LOCKED=true;}
  revealReveal(rec,()=>{
    fillCard(rec,false,lock);sndPop();
    dim.classList.add('on');card.classList.add('up');
    confetti(40);
  });
}

/* 매진/오류 등 특수 카드 */
function showSpecialCard(title,msg,retry){
  $rv('cardTitle').innerHTML=title;
  $rv('prizeBox').style.display='none';
  $rv('cardMsg').innerHTML=msg;
  $rv('cardHumor').textContent='';
  $rv('staffNote').style.display='none';
  const btn=$rv('btn-retry');
  if(retry){btn.style.display='block';btn.textContent='다시 시도 🔄';}else{btn.style.display='none';}
  dim.classList.add('on');card.classList.add('up');
}

function fillCard(rec,isRevisit,lock){
  document.getElementById('cardTitle').innerHTML=isRevisit
    ?'참여 완료! <span class="hl">당첨 확인</span> ✅'
    :'GOAL! <span class="hl">당첨을 축하합니다!</span> 🎉';
  document.getElementById('prizeBox').style.display='block';
  document.getElementById('prizeName').textContent=rec.n;
  (function(){var emo=document.getElementById('cardEmoji'),pim=document.getElementById('prizeImg');
    emo.textContent=rec.e;emo.style.display='block';pim.style.display='none';
    var probe=new Image();
    probe.onload=function(){pim.src=probe.src;pim.style.display='block';emo.style.display='none';};
    probe.onerror=function(){pim.style.display='none';emo.style.display='block';};
    probe.src='prizes/'+encodeURIComponent(rec.n)+'.jpg';})();
  const gr=document.getElementById('prizeGrade');
  gr.textContent=rec.g;
  if((rec.tier&&rec.tier>=3)||/특급|최고급/.test(rec.g||'')){gr.style.background='linear-gradient(180deg,#ffd700,#f59f00)';gr.style.color='#5b3d00';}
  else{gr.style.background='';gr.style.color='';}
  document.getElementById('prizeMeta').textContent=`당첨번호 ${rec.c} · ${fmtT(rec.t)}`+(TEST?' · 상품 구성 예시':'');
  document.getElementById('cardMsg').innerHTML=isRevisit
    ?'이미 참여하신 기록이에요.<br>아직 경품을 안 받으셨다면 지금 받아가세요!'
    :'완벽한 슈팅! 오늘 대한민국도 골 폭죽 🇰🇷';
  document.getElementById('cardHumor').textContent='아무거나 하나만 사도 참여 가능! 🛒 오늘 장보고 경품 받아가세요';
  const staff=document.getElementById('staffNote');
  const btn=document.getElementById('btn-retry');
  if(lock){staff.style.display='block';btn.style.display='none';}
  else{staff.style.display='none';btn.style.display='block';btn.textContent='한번 더 도전! ⚽';}
}

/* Confetti — 식자재 조각이 함께 떨어짐 */
const FOOD_CONF=['🍅','🥬','🥕','🍉','🧅','🍄','🦑'];
function confetti(n){
  const C=['#FFD700','#FF6B35','#4ECDC4','#45B7D1','#A8E063','#FFEAA7','#e8443a','#3b6fd4','#fff'];
  for(let i=0;i<n;i++){
    const el=document.createElement('div');el.className='conf';
    if(Math.random()<.16){
      el.textContent=FOOD_CONF[(Math.random()*FOOD_CONF.length)|0];
      el.style.cssText=`left:${Math.random()*100}%;font-size:${13+Math.random()*8}px;line-height:1;animation-duration:${2.2+Math.random()*1.6}s;animation-delay:${Math.random()*.5}s`;
    }else{
      const sz=7+Math.random()*9;
      el.style.cssText=`left:${Math.random()*100}%;width:${sz}px;height:${sz*1.4}px;background:${C[i%C.length]};border-radius:${Math.random()>.5?'50%':'2px'};animation-duration:${2+Math.random()*1.6}s;animation-delay:${Math.random()*.5}s`;
    }
    confEl.appendChild(el);
  }
  setTimeout(()=>{confEl.innerHTML='';},4800);
}

/* Reset (테스트 모드 전용) */
function reset(){
  card.classList.remove('up');dim.classList.remove('on');
  confEl.innerHTML='';
  goalText.classList.remove('show');
  stage.classList.remove('zoom');vignetteEl.classList.remove('on');
  sky.classList.remove('hype');
  if(window.__netBall){window.__netBall.remove();window.__netBall=null;}
  keeperEl.style.transition='none';
  keeperEl.style.left='50%';keeperEl.style.bottom='2%';keeperEl.style.transform='translateX(-50%)';
  keeperShadow.style.left='50%';keeperShadow.style.opacity='.16';
  requestAnimationFrame(()=>{keeperEl.style.transition='left .32s cubic-bezier(.34,1.3,.5,1),bottom .32s cubic-bezier(.34,1.3,.5,1),transform .32s cubic-bezier(.34,1.3,.5,1)';keeperEl.classList.add('idle');});
  keeperFace(true);setPupils(0,0);
  ball.style.opacity='1';ball.style.transition='none';ball.style.transform='translate(-50%,-50%)';
  requestAnimationFrame(()=>ball.classList.add('glow'));
  inst.textContent=INST_TXT;inst.style.opacity='1';
  clearZone();hideDots();shooting=dragOn=false;
}

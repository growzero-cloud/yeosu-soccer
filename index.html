<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no,maximum-scale=1">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#bfe6f7">
<title>대한민국 응원 패널티킥 | 여수식자재마트 어항단지점</title>
<style>
:root{
  --ink:#2b2b2b;
  --sky1:#bfe6f7; --sky2:#e3f4fb;
  --stand1:#7fb8cd; --stand2:#9ccadb; --stand3:#b4d9e6;
  --grass1:#6cc24a; --grass2:#5cb23c; --grass3:#79cc57;
  --orange:#fb8c2a; --orange-d:#e06d12; --orange-l:#ffa94d;
  --brown:#a06a3a; --cream:#f7d9a8; --cream-l:#fdeecb;
  --mint1:#dcf6e4; --mint2:#aae9c0; --mint3:#8fe0ac;
  --redK:#e8443a;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;-webkit-user-select:none;user-select:none}
html,body{width:100%;height:100%;overflow:hidden;font-family:-apple-system,'Apple SD Gothic Neo','Noto Sans KR',sans-serif;background:#bfe6f7}

.layer{position:fixed;top:0;left:0;width:100%;height:100%;display:none;flex-direction:column}

/* ════════════ START ════════════ */
#s-start{
  background:linear-gradient(170deg,var(--mint1) 0%,var(--mint2) 60%,var(--mint3) 100%);
  align-items:center;justify-content:flex-start;
  padding:0;overflow:hidden;
}
.start-top{padding:6vh 24px 0;text-align:center;z-index:2;position:relative}
.kbadge{display:inline-flex;align-items:center;gap:6px;background:rgba(255,255,255,.6);border:2px solid rgba(43,43,43,.12);border-radius:100px;padding:5px 14px;font-size:.78rem;font-weight:800;color:#2b6b3a;margin-bottom:14px}
/* 마트 간판 락업 — 홍보 주인공 */
.store-name{font-size:2.35rem;font-weight:900;color:var(--orange-d);letter-spacing:-.03em;line-height:1.05;text-shadow:0 2px 0 rgba(255,255,255,.55)}
.store-branch{display:inline-block;margin-top:9px;background:var(--ink);color:#fff;font-size:.95rem;font-weight:800;border-radius:100px;padding:5px 20px;letter-spacing:.06em}
.fighting{font-family:'Arial Black','Arial',sans-serif;font-style:italic;font-weight:900;color:var(--ink);line-height:.92;letter-spacing:-.01em;transform:skewX(-7deg)}
.fighting.sm{margin-top:15px}
.fighting.sm .l1{font-size:1.4rem;display:block}
.start-desc{margin-top:13px;font-size:1.02rem;font-weight:800;color:#444;line-height:1.5}
.start-desc .hl{color:var(--orange-d)}
.start-date{margin-top:4px;font-size:.92rem;font-weight:800;color:#2b6b3a}
.start-humor{margin-top:10px;font-size:.8rem;font-weight:700;color:#587f63;opacity:.9}

.start-illust{position:absolute;left:0;right:0;bottom:0;height:56%;z-index:1}
.si-ball{position:absolute;left:8%;top:30%;width:88px;height:88px;animation:floaty 3s ease-in-out infinite}
.si-keeper{position:absolute;right:-4%;bottom:6%;width:62%;max-width:300px;transform:rotate(8deg);animation:floaty 3.4s ease-in-out infinite}
.dash{position:absolute;border-radius:100px;background:#7fce93;opacity:.8}
.fgro{position:absolute;z-index:2;pointer-events:none;filter:drop-shadow(0 4px 6px rgba(0,0,0,.14));animation:floaty 3.2s ease-in-out infinite}
@keyframes floaty{0%,100%{transform:translateY(0) rotate(0)}50%{transform:translateY(-12px) rotate(4deg)}}
@keyframes floaty2{0%,100%{transform:translateY(0) rotate(8deg)}50%{transform:translateY(-12px) rotate(11deg)}}

.btn-dark{
  position:absolute;left:24px;right:24px;bottom:5vh;z-index:5;
  background:linear-gradient(180deg,var(--orange) 0%,var(--orange-d) 100%);color:#fff;border:none;border-radius:18px;
  padding:19px;font-size:1.18rem;font-weight:800;cursor:pointer;
  box-shadow:0 8px 20px rgba(224,109,18,.4);touch-action:manipulation;
}
.btn-dark:active{transform:scale(.97)}

/* ════════════ GAME ════════════ */
#s-game{flex-direction:column;align-items:stretch;background:var(--sky1)}

/* HUD */
.hud{
  flex:0 0 auto;display:flex;align-items:center;justify-content:space-between;
  padding:14px 18px 8px;z-index:30;position:relative;
}
.hud-pill{display:flex;align-items:center;gap:8px;background:rgba(255,255,255,.75);border-radius:100px;padding:6px 14px 6px 8px;box-shadow:0 2px 8px rgba(0,0,0,.08)}
.hud-pill .pico{width:26px;height:26px}
.hud-pill .ptxt{font-size:.95rem;font-weight:900;color:var(--ink)}
.hud-score{font-size:1rem;font-weight:800;color:var(--ink)}

/* Stage */
.stage{position:relative;flex:1 1 auto;width:100%;overflow:hidden}

/* Sky + stands */
.sky{position:absolute;top:0;left:0;right:0;height:60%;background:linear-gradient(180deg,var(--sky1) 0%,var(--sky2) 100%);overflow:hidden}
.stands{position:absolute;left:-5%;right:-5%;top:14%;height:34%;border-radius:0 0 50% 50%/0 0 16% 16%}
.stands .band{position:absolute;left:0;right:0;border-radius:50%/100%}
.cloud{position:absolute;background:#fff;border-radius:100px;opacity:.9}
.cloud::before,.cloud::after{content:'';position:absolute;background:#fff;border-radius:50%}
.flag{position:absolute;width:0;height:0;border-style:solid}
.spark4{position:absolute;color:#fff;font-size:14px;opacity:.9;pointer-events:none}
.flood{position:absolute;top:6%;width:74px}
.flood .pole{position:absolute;left:50%;top:38px;width:5px;height:60px;background:#9bb0bc;transform:translateX(-50%);border-radius:3px}
.flood .panel{position:relative;width:74px;height:42px;background:#eef6fa;border:2px solid #b9d2dd;border-radius:8px;display:grid;grid-template-columns:repeat(3,1fr);grid-template-rows:repeat(2,1fr);gap:3px;padding:5px;box-shadow:0 0 18px rgba(255,255,255,.7)}
.flood .panel i{background:#fff;border-radius:50%;box-shadow:0 0 4px rgba(255,255,150,.9)}
.flood.left{left:3%}
.flood.right{right:3%}

/* Goal */
.goalwrap{position:absolute;top:25%;left:50%;transform:translateX(-50%);width:90%;max-width:370px;z-index:4}
.goalsvg{width:100%;display:block;overflow:visible}
.netimpact{position:absolute;width:60px;height:60px;border-radius:50%;background:radial-gradient(circle,rgba(255,255,255,.7) 0%,rgba(255,255,255,0) 70%);transform:translate(-50%,-50%) scale(.2);pointer-events:none;z-index:6}

/* Keeper — positioned within the goal mouth (parent = .goalwrap) */
.keeper{
  position:absolute;left:50%;bottom:1%;
  width:44%;max-width:150px;z-index:5;
  transform:translateX(-50%);
  transform-origin:bottom center;
  transition:left .32s cubic-bezier(.34,1.3,.5,1),bottom .32s cubic-bezier(.34,1.3,.5,1),transform .32s cubic-bezier(.34,1.3,.5,1);
  filter:drop-shadow(0 5px 4px rgba(0,0,0,.14));
}
.keeper svg{width:100%;display:block;overflow:visible}
.keeper-shadow{position:absolute;left:50%;bottom:-1%;width:34%;max-width:120px;height:15px;background:rgba(0,0,0,.16);border-radius:50%;transform:translateX(-50%);z-index:3;filter:blur(2px);transition:all .32s ease}

/* Field */
.field{position:absolute;left:0;right:0;bottom:0;height:44%;overflow:hidden;background:var(--grass1)}
.field .stripe{position:absolute;left:-10%;right:-10%;height:40%}
.fieldline{position:absolute;left:0;right:0;height:5px;background:#eafae4;border-radius:4px;opacity:.85}
.pkspot{position:absolute;left:50%;top:26%;width:14px;height:7px;background:#eafae4;border-radius:50%;transform:translateX(-50%);opacity:.8}
.tuft{position:absolute;color:var(--grass2);font-weight:900;font-size:13px;opacity:.55;pointer-events:none;line-height:1}

/* 경기장 펜스 광고보드 — 마트 홍보 */
.adboard{position:absolute;left:-1%;right:-1%;top:51.2%;height:4.6%;display:flex;gap:6px;z-index:2;padding:0 4px}
.adboard .ap{flex:1 0 auto;display:flex;align-items:center;justify-content:center;background:#fff;border:2.5px solid var(--ink);border-radius:9px;font-size:.7rem;font-weight:900;color:var(--orange-d);white-space:nowrap;padding:0 12px;box-shadow:0 3px 0 rgba(0,0,0,.13)}
.adboard .ap.alt{background:linear-gradient(180deg,var(--orange) 0%,var(--orange-d) 100%);color:#fff}

/* Ball (watermelon) */
.ball{position:absolute;left:50%;top:70%;width:74px;height:74px;transform:translate(-50%,-50%);z-index:8;pointer-events:none}
.ball svg{width:100%;height:100%;display:block;overflow:visible}
.ball.glow{filter:drop-shadow(0 0 10px rgba(255,255,120,.9)) drop-shadow(0 0 18px rgba(120,220,90,.6));animation:ballpulse 1.1s ease-in-out infinite}
@keyframes ballpulse{0%,100%{transform:translate(-50%,-50%) scale(1)}50%{transform:translate(-50%,-50%) scale(1.06)}}

/* Aim zones */
.aimgrid{position:absolute;top:25%;left:50%;transform:translateX(-50%);width:90%;max-width:370px;z-index:7;pointer-events:none}
.aimgrid .inner{position:absolute;left:6%;right:6%;top:14%;bottom:6%;display:grid;grid-template-columns:repeat(3,1fr);grid-template-rows:repeat(3,1fr)}
.az{border-radius:8px;transition:background .1s,box-shadow .1s;margin:2px}
.az.on{background:rgba(255,205,60,.45);box-shadow:inset 0 0 14px rgba(255,180,30,.7)}

/* Trajectory dots (slingshot aim preview) */
.tdot{position:fixed;border-radius:50%;background:rgba(255,255,255,.95);border:2px solid rgba(43,43,43,.18);z-index:24;pointer-events:none;transform:translate(-50%,-50%);box-shadow:0 2px 6px rgba(0,0,0,.14)}

.inst{position:absolute;left:0;right:0;bottom:5%;text-align:center;font-size:1.02rem;font-weight:800;color:#fff;text-shadow:0 2px 5px rgba(0,0,0,.35);z-index:9;pointer-events:none;animation:instFloat 1.7s ease-in-out infinite}
@keyframes instFloat{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}
.swipe{position:absolute;inset:0;z-index:25;touch-action:none}

/* Speed dashes (kick) */
.sdash{position:absolute;background:#fff;border-radius:100px;z-index:8;pointer-events:none;opacity:.9}

/* Trajectory beam */
#beam{position:absolute;height:18px;border-radius:100px;transform-origin:left center;z-index:6;pointer-events:none;opacity:0;
  background:linear-gradient(90deg,rgba(255,255,255,0) 0%,rgba(180,240,150,.55) 60%,rgba(255,255,150,.8) 100%);}

/* GOAL watermark */
#goalText{
  position:absolute;top:24%;left:50%;transform:translate(-50%,-50%) skewX(-7deg) scale(.4);
  font-family:'Arial Black','Arial',sans-serif;font-style:italic;font-weight:900;
  font-size:4.6rem;color:var(--ink);z-index:40;opacity:0;pointer-events:none;
  -webkit-text-stroke:2px #fff;text-shadow:0 6px 0 rgba(0,0,0,.15);white-space:nowrap;
}
#goalText.show{animation:goalPop .5s cubic-bezier(.2,1.4,.4,1) forwards}
@keyframes goalPop{0%{opacity:0;transform:translate(-50%,-50%) skewX(-7deg) scale(.3)}60%{opacity:1;transform:translate(-50%,-50%) skewX(-7deg) scale(1.12)}100%{opacity:.92;transform:translate(-50%,-50%) skewX(-7deg) scale(1)}}

/* sweat / emote */
.emote{position:absolute;font-size:1.6rem;z-index:9;pointer-events:none;opacity:0}
.emote.show{animation:emoteUp 1s ease forwards}
@keyframes emoteUp{0%{opacity:0;transform:translateY(8px) scale(.5)}30%{opacity:1;transform:translateY(-4px) scale(1.1)}100%{opacity:0;transform:translateY(-26px) scale(1)}}

/* ════════════ RESULT CARD ════════════ */
.card{
  position:fixed;left:0;right:0;bottom:0;z-index:60;
  background:#fff;border-radius:28px 28px 0 0;
  padding:24px 22px calc(24px + env(safe-area-inset-bottom));
  box-shadow:0 -8px 30px rgba(0,0,0,.18);
  transform:translateY(110%);transition:transform .42s cubic-bezier(.2,1,.3,1);
  text-align:center;
}
.card.up{transform:translateY(0)}
.card-store{display:inline-block;background:#fff3e4;color:var(--orange-d);border:1.5px solid #f5c894;font-size:.8rem;font-weight:900;border-radius:100px;padding:5px 15px;margin-bottom:10px}
.card .ctitle{font-size:1.6rem;font-weight:900;color:var(--ink);margin-bottom:12px}
.card .ctitle .hl{color:var(--orange-d)}
.prize-box{background:#fff7ec;border:2px dashed #f0b46a;border-radius:18px;padding:14px 12px 13px;margin-bottom:12px}
.prize-box .cemoji{font-size:3.2rem;line-height:1.1}
.prize-name{font-size:1.3rem;font-weight:900;color:var(--ink);margin-top:6px}
.prize-grade{display:inline-block;margin-top:7px;background:var(--orange);color:#fff;font-size:.72rem;font-weight:800;border-radius:100px;padding:3px 11px}
.prize-meta{margin-top:8px;font-size:.73rem;color:#a3a3a3;font-weight:600}
.card .cmsg{font-size:.95rem;font-weight:700;color:#555;line-height:1.5;margin-bottom:10px}
.humor{font-size:.82rem;color:#8a8a8a;font-weight:700;margin-bottom:12px}
.staff-note{background:#eafaef;border-radius:12px;padding:13px;font-size:.9rem;font-weight:800;color:#2b6b3a;margin-bottom:12px}
.card .cbrand{font-size:.78rem;font-weight:800;color:#2b6b3a;margin-bottom:14px;letter-spacing:.02em}
.card .btn-dark{position:static;box-shadow:0 6px 16px rgba(0,0,0,.18);width:100%}

/* dim behind card */
#dim{position:fixed;inset:0;background:rgba(0,0,0,.18);z-index:55;opacity:0;transition:opacity .4s;pointer-events:none}
#dim.on{opacity:1}

/* Confetti / flash */
#confetti{position:fixed;inset:0;pointer-events:none;z-index:70;overflow:hidden}
.conf{position:absolute;top:-20px;animation:cfall linear forwards}
@keyframes cfall{to{transform:translateY(115vh) rotate(900deg);opacity:0}}
#flash{position:fixed;inset:0;z-index:50;pointer-events:none;opacity:0}
@keyframes flashOut{0%{opacity:1}100%{opacity:0}}
.spark{position:fixed;border-radius:50%;pointer-events:none;z-index:65;animation:sparkOut .8s ease-out forwards}
@keyframes sparkOut{0%{transform:translate(-50%,-50%) scale(1.4);opacity:1}100%{transform:translate(calc(-50% + var(--dx)),calc(-50% + var(--dy))) scale(0);opacity:0}}

@keyframes shake{0%,100%{transform:none}20%{transform:translate(-5px,2px)}40%{transform:translate(5px,-2px)}60%{transform:translate(-4px,3px)}80%{transform:translate(4px,-1px)}}
.stage.shake{animation:shake .35s ease}
@keyframes netS{0%,100%{transform:none}25%{transform:translateY(4px)}50%{transform:translateY(-2px)}75%{transform:translateY(3px)}}
</style>
</head>
<body>

<!-- ════ START ════ -->
<div id="s-start" class="layer">
  <div class="start-top">
    <span class="kbadge">🇰🇷 2026 월드컵 응원 이벤트</span>
    <div class="store-name">여수식자재마트</div>
    <span class="store-branch">어항단지점</span>
    <div class="fighting sm"><span class="l1">⚽ FIGHTING KOREA ⚽</span></div>
    <div class="start-desc">수박 슛 차고 <span class="hl">경품</span> 받아가세요! 🍉</div>
    <div class="start-date">꽝 없음! 100% 전원 당첨 🎁</div>
    <div class="start-humor">참가비 무료! 대신 인간적으로 뭐 하나는 사주실 거죠? 🥹🛒</div>
  </div>
  <div class="start-illust" id="startIllust"></div>
  <button id="btn-start" class="btn-dark">시작하기</button>
</div>

<!-- ════ GAME ════ -->
<div id="s-game" class="layer">
  <div class="hud">
    <div class="hud-pill"><span class="pico" id="hudball"></span><span class="ptxt">여수식자재마트 어항단지점</span></div>
    <div class="hud-score">🇰🇷 월드컵 응원</div>
  </div>

  <div class="stage" id="stage">
    <!-- sky -->
    <div class="sky" id="sky">
      <div class="stands" id="stands"></div>
      <div class="flood left"><div class="panel"><i></i><i></i><i></i><i></i><i></i><i></i></div><div class="pole"></div></div>
      <div class="flood right"><div class="panel"><i></i><i></i><i></i><i></i><i></i><i></i></div><div class="pole"></div></div>
    </div>

    <!-- field -->
    <div class="field" id="field">
      <div class="stripe" style="top:0;background:var(--grass3)"></div>
      <div class="stripe" style="top:40%;background:var(--grass1)"></div>
      <div class="stripe" style="top:80%;background:var(--grass2)"></div>
      <div class="fieldline" style="top:34%"></div>
      <div class="pkspot"></div>
    </div>

    <!-- 펜스 광고보드 (마트 홍보) -->
    <div class="adboard" id="adboard"></div>

    <!-- goal (keeper lives inside, positioned on the goal line) -->
    <div class="goalwrap" id="goalwrap">
      <svg class="goalsvg" id="goalsvg" viewBox="0 0 370 210">
        <g id="netGrid" stroke="#ffffff" stroke-width="2" opacity=".75"></g>
        <path id="frameback" d="M16,206 L16,40 Q16,20 36,20 L334,20 Q354,20 354,40 L354,206" fill="none" stroke="#2b2b2b" stroke-width="20" stroke-linecap="round" stroke-linejoin="round"/>
        <path d="M16,206 L16,40 Q16,20 36,20 L334,20 Q354,20 354,40 L354,206" fill="none" stroke="#ffffff" stroke-width="13" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      <div class="keeper-shadow" id="keeperShadow"></div>
      <div class="keeper" id="keeper"></div>
    </div>

    <!-- aim zones -->
    <div class="aimgrid"><div class="inner" id="aimInner"></div></div>

    <!-- ball -->
    <div class="ball glow" id="ball"></div>

    <!-- beam / goal text / emote -->
    <div id="beam"></div>
    <div id="goalText">GOAL!</div>
    <div class="emote" id="emote">💦</div>

    <div class="inst" id="inst">수박을 아래로 쭉~ 당겼다 놓으면 슛! 🍉</div>
    <div class="swipe" id="swipe"></div>
  </div>
</div>

<!-- ════ RESULT ════ -->
<div id="dim"></div>
<div class="card" id="card">
  <div class="card-store">🛒 여수식자재마트 <b>어항단지점</b></div>
  <div class="ctitle" id="cardTitle">GOAL!</div>
  <div class="prize-box" id="prizeBox" style="display:none">
    <div class="cemoji" id="cardEmoji">🎁</div>
    <div class="prize-name" id="prizeName"></div>
    <span class="prize-grade" id="prizeGrade"></span>
    <div class="prize-meta" id="prizeMeta"></div>
  </div>
  <div class="cmsg" id="cardMsg"></div>
  <div class="humor" id="cardHumor"></div>
  <div class="staff-note" id="staffNote" style="display:none">📢 계산대에서 직원에게 이 화면을 보여주세요</div>
  <div class="cbrand">오늘 장보기는 여수식자재마트 어항단지점에서! 🛒</div>
  <button id="btn-retry" class="btn-dark">한번 더 도전! ⚽</button>
</div>

<div id="flash"></div>
<div id="confetti"></div>

<script>
'use strict';

/* ───────── Watermelon ball art ───────── */
let __wm=0;
function wmSVG(){
  __wm++;const id='wmc'+__wm;
  return `<svg viewBox="0 0 100 100"><defs><clipPath id="${id}"><circle cx="50" cy="50" r="40"/></clipPath></defs>
  <circle cx="50" cy="50" r="43" fill="#4cbf55" stroke="#2b2b2b" stroke-width="5"/>
  <g clip-path="url(#${id})" stroke="#2f9038" fill="none" stroke-linecap="round">
    <path d="M50 6 q10 22 0 44 q-10 22 0 44" stroke-width="10"/>
    <path d="M24 8 q9 21 0 42 q-9 21 0 42" stroke-width="9"/>
    <path d="M76 8 q-9 21 0 42 q9 21 0 42" stroke-width="9"/>
    <path d="M8 22 q7 14 1 28 q-6 14 1 28" stroke-width="7"/>
    <path d="M92 22 q-7 14 -1 28 q6 14 -1 28" stroke-width="7"/>
  </g>
  <path d="M50 8 q-1 -7 6 -9" stroke="#5b3d20" stroke-width="5" fill="none" stroke-linecap="round"/>
  <ellipse cx="35" cy="30" rx="12" ry="7" fill="#fff" opacity=".5" transform="rotate(-28 35 30)"/>
  </svg>`;
}

function keeperSVG(){return `<svg viewBox="0 0 220 240" xmlns="http://www.w3.org/2000/svg">
  <!-- feet -->
  <ellipse cx="84" cy="223" rx="23" ry="13" fill="#fff" stroke="#2b2b2b" stroke-width="5"/>
  <ellipse cx="136" cy="223" rx="23" ry="13" fill="#fff" stroke="#2b2b2b" stroke-width="5"/>
  <!-- legs -->
  <rect x="72" y="184" width="30" height="42" rx="15" fill="#a06a3a" stroke="#2b2b2b" stroke-width="5"/>
  <rect x="118" y="184" width="30" height="42" rx="15" fill="#a06a3a" stroke="#2b2b2b" stroke-width="5"/>
  <!-- arms (orange sleeves) -->
  <path d="M80 142 Q50 120 44 84" fill="none" stroke="#fb8c2a" stroke-width="30" stroke-linecap="round"/>
  <path d="M140 142 Q170 120 176 84" fill="none" stroke="#fb8c2a" stroke-width="30" stroke-linecap="round"/>

/* ── Slingshot input: pull back → trajectory preview → release to shoot ── */
let dragOn=false,pSX=0,pSY=0,baseX=0,baseY=0;
const DOT_N=7,dots=[];
(function(){for(let i=0;i<DOT_N;i++){const d=document.createElement('div');d.className='tdot';d.style.display='none';document.body.appendChild(d);dots.push(d);}})();
function hideDots(){dots.forEach(d=>d.style.display='none');}

function calcZoneFromPull(px,py){ // pull vector: down=+y. aim = inverted (slingshot)
  const W=innerWidth,H=innerHeight;
  const row=py>H*.13?0:py>H*.05?1:2;       // 더 길게 당길수록 높은 코스
  const col=px<-W*.09?2:px>W*.09?0:1;      // 왼쪽으로 당기면 오른쪽 코스
  return row*3+col;
}

function updateAim(px,py){
  const dist=Math.hypot(px,py);
  const ox=Math.max(-46,Math.min(46,px*.38)), oy=Math.max(-14,Math.min(60,py*.38));
  ball.style.transition='none';
  ball.style.transform=`translate(-50%,-50%) translate(${ox}px,${oy}px) scale(${1+Math.min(dist/900,.08)})`;
  if(dist<=36){hideDots();clearZone();return;}
  const z=calcZoneFromPull(px,py);
  setZone(z);
  const[tx,ty]=zonePoint(z);
  const mx=(baseX+tx)/2, my=(baseY+ty)/2-Math.min(110,Math.hypot(tx-baseX,ty-baseY)*.22);
  for(let i=0;i<DOT_N;i++){
    const t=.14+.74*i/(DOT_N-1);
    const x=(1-t)*(1-t)*baseX+2*(1-t)*t*mx+t*t*tx;
    const y=(1-t)*(1-t)*baseY+2*(1-t)*t*my+t*t*ty;
    const s=13-7*i/(DOT_N-1);
    const d=dots[i];d.style.display='block';
    d.style.left=x+'px';d.style.top=y+'px';d.style.width=s+'px';d.style.height=s+'px';
    d.style.opacity=String(.95-.45*i/(DOT_N-1));
  }
}

function dragStart(x,y){
  if(shooting||LOCKED)return;
  dragOn=true;pSX=x;pSY=y;
  const r=ball.getBoundingClientRect();baseX=r.left+r.width/2;baseY=r.top+r.height/2;
  ball.classList.remove('glow');
}
function dragMove(x,y){if(!dragOn||shooting)return;updateAim(x-pSX,y-pSY);}
function dragEnd(x,y){
  if(!dragOn||shooting)return;dragOn=false;
  const px=x-pSX,py=y-pSY;hideDots();
  if(Math.hypot(px,py)>36){snapShoot(calcZoneFromPull(px,py));}
  else cancelPull();
}
function cancelPull(){
  clearZone();
  ball.style.transition='transform .25s cubic-bezier(.34,1.5,.5,1)';
  ball.style.transform='translate(-50%,-50%)';
  setTimeout(()=>ball.classList.add('glow'),260);
}
function snapShoot(zone){
  ball.style.transition='transform .1s cubic-bezier(.3,.7,.4,1)';
  ball.style.transform='translate(-50%,-50%) translateY(-10px) scale(1.03)';
  setTimeout(()=>shoot(zone),70);
}

/* Audio */
function initAudio(){if(!actx){try{actx=new(window.AudioContext||window.webkitAudioContext)();}catch(e){}}}
function beep(f,d,t,v){try{initAudio();const o=actx.createOscillator(),g=actx.createGain();o.connect(g);g.connect(actx.destination);o.type=t||'sine';o.frequency.setValueAtTime(f,actx.currentTime);o.frequency.exponentialRampToValueAtTime(f*.3,actx.currentTime+d);g.gain.setValueAtTime(v||.6,actx.currentTime);g.gain.exponentialRampToValueAtTime(.001,actx.currentTime+d);o.start();o.stop(actx.currentTime+d);}catch(e){}}
function sndKick(){beep(170,.12,'sine',.7);}
function sndGoal(){[523,659,784,1047,1319].forEach((f,i)=>setTimeout(()=>beep(f,.18,'triangle',.4),i*75));}
function sndCheer(){try{
  initAudio();const dur=1.5;
  const buf=actx.createBuffer(1,actx.sampleRate*dur,actx.sampleRate);
  const d=buf.getChannelData(0);
  for(let i=0;i<d.length;i++){d[i]=(Math.random()*2-1)*Math.pow(Math.sin(Math.PI*i/d.length),2);}
  const src=actx.createBufferSource();src.buffer=buf;
  const f=actx.createBiquadFilter();f.type='bandpass';f.frequency.value=1100;f.Q.value=.8;
  const g=actx.createGain();
  g.gain.setValueAtTime(.0001,actx.currentTime);
  g.gain.exponentialRampToValueAtTime(.45,actx.currentTime+.22);
  g.gain.exponentialRampToValueAtTime(.001,actx.currentTime+dur);
  src.connect(f);f.connect(g);g.connect(actx.destination);src.start();
}catch(e){}}

/* Shoot — 골 확률 100%, 키퍼는 항상 다른 코스로 다이빙 */
function shoot(zone){
  if(shooting)return;shooting=true;clearZone();hideDots();sndKick();
  inst.textContent='슈팅!!! 🍉';
  let kz;do{kz=Math.floor(Math.random()*9);}while(kz===zone);
  speedDashes();
  ball.style.transition='transform .07s ease';
  ball.style.transform='translate(-50%,-50%) scale(.9)';
  setTimeout(()=>{
    dive(kz);
    flyBall(zone);
    setTimeout(()=>result(zone),1200);
  },70);
}

/* compute screen point for a goal zone */
function zonePoint(zone){
  const gR=document.getElementById('goalsvg').getBoundingClientRect();
  const ix=gR.left+gR.width*0.075, iy=gR.top+gR.height*0.12;
  const iw=gR.width*0.85, ih=gR.height*0.74;
  const[tx,ty]=BALL_TGT[zone];
  return [ix+iw*tx/100, iy+ih*ty/100];
}

/* Ball flight (always a goal) */
function flyBall(zone){
  const bR=ball.getBoundingClientRect();
  const sx2=bR.left+bR.width/2, sy2=bR.top+bR.height/2;
  const [tpx,tpy]=zonePoint(zone);
  const ang=Math.atan2(tpy-sy2,tpx-sx2)*180/Math.PI;
  const len=Math.hypot(tpx-sx2,tpy-sy2);
  beam.style.left=sx2+'px';beam.style.top=sy2+'px';beam.style.width=len+'px';
  beam.style.transform=`rotate(${ang}deg)`;
  beam.style.opacity='1';beam.style.transition='opacity .5s ease .15s';
  setTimeout(()=>beam.style.opacity='0',150);

  const sh=document.createElement('div');
  sh.style.cssText=`position:fixed;left:${sx2}px;top:${sy2}px;width:52px;height:15px;border-radius:50%;background:rgba(0,0,0,.22);transform:translate(-50%,-50%);z-index:7;pointer-events:none;filter:blur(2px)`;
  document.body.appendChild(sh);
  const g=document.createElement('div');
  g.style.cssText=`position:fixed;left:${sx2}px;top:${sy2}px;width:64px;height:64px;transform:translate(-50%,-50%);z-index:46;pointer-events:none;filter:drop-shadow(0 4px 6px rgba(0,0,0,.35))`;
  g.innerHTML=wmSVG();document.body.appendChild(g);
  ball.style.opacity='0';
  const dx=tpx-sx2,dy=tpy-sy2,groundY=sy2;

  const dur=560,arc=Math.min(70,Math.abs(dy)*.3+38),t0=performance.now();
  (function step(t){
    const p=Math.min((t-t0)/dur,1);
    const px=1-Math.pow(1-p,1.9),py=1-Math.pow(1-p,1.7);
    const h=arc*Math.sin(Math.PI*p);
    const cx=sx2+dx*px,cy=sy2+dy*py-h;
    g.style.left=cx+'px';g.style.top=cy+'px';
    g.style.transform=`translate(-50%,-50%) scale(${1-.42*p}) rotate(${p*640}deg)`;
    sh.style.left=cx+'px';sh.style.top=(groundY+dy*py)+'px';
    const ss=(1-.5*p)*(1-Math.min(h/160,.7));sh.style.transform=`translate(-50%,-50%) scale(${Math.max(ss,.1)})`;sh.style.opacity=String(.22*(1-p*.5));
    if(p<1)requestAnimationFrame(step);
    else{sh.remove();stickBallInNet(g,zone);goalImpact(zone);}
  })(performance.now());
}

/* ball sticks in the net on goal */
function stickBallInNet(g,zone){
  g.style.transition='transform .12s ease-out';
  g.style.transform='translate(-50%,-50%) scale(.58)';
  window.__netBall=g;
  setTimeout(()=>{g.style.transform='translate(-50%,-52%) scale(.58)';},120);
  setTimeout(()=>{g.style.transform='translate(-50%,-50%) scale(.58)';},260);
}

/* Keeper dive */
function dive(zone){
  curDiveZone=zone;
  const[lp,bp,rot]=DIVE[zone];
  keeperEl.style.left=lp+'%';keeperEl.style.bottom=bp+'%';
  keeperEl.style.transform=`translateX(-50%) rotate(${rot}deg)`;
  keeperShadow.style.left=lp+'%';
  keeperShadow.style.opacity=bp>20?'.05':'.16';
}

function goalImpact(zone){
  netImpactAt(zone);
  stage.classList.add('shake');setTimeout(()=>stage.classList.remove('shake'),350);
  burst(zone,['#FFD700','#ff5a5a','#4cbf55','#FFF176','#FFAB40','#fff']);
  flashGold();sndGoal();sndCheer();
  goalText.classList.add('show');
  showEmote(curDiveZone,'💦');
}

function showEmote(zone,ch){
  const r=keeperEl.getBoundingClientRect();
  emote.textContent=ch;
  emote.style.left=(r.left+r.width*0.5- stage.getBoundingClientRect().left)+'px';
  emote.style.top=(r.top - stage.getBoundingClientRect().top - 6)+'px';
  emote.classList.remove('show');void emote.offsetWidth;emote.classList.add('show');
}

function netImpactAt(zone){
  const gw=document.getElementById('goalwrap').getBoundingClientRect();
  const [px,py]=zonePoint(zone);
  const el=document.createElement('div');el.className='netimpact';
  el.style.left=(px-gw.left)+'px';el.style.top=(py-gw.top)+'px';
  document.getElementById('goalwrap').appendChild(el);
  requestAnimationFrame(()=>{el.style.transition='transform .18s ease-out,opacity .4s ease';el.style.transform='translate(-50%,-50%) scale(1.8)';});
  setTimeout(()=>el.style.opacity='0',200);setTimeout(()=>el.remove(),650);
  document.getElementById('goalsvg').style.animation='netS .45s ease';
  setTimeout(()=>document.getElementById('goalsvg').style.animation='',460);
}

function flashGold(){
  flashEl.style.cssText='position:fixed;inset:0;z-index:50;pointer-events:none;background:rgba(255,245,120,.85)';
  flashEl.style.animation='none';requestAnimationFrame(()=>flashEl.style.animation='flashOut .32s ease-out forwards');
}

function burst(zone,colors){
  const [cx,cy]=zonePoint(zone);
  for(let i=0;i<18;i++){
    const a=(i/18)*Math.PI*2+Math.random()*.3,d=45+Math.random()*90;
    const el=document.createElement('div');el.className='spark';
    el.style.cssText=`left:${cx}px;top:${cy}px;width:${5+Math.random()*7}px;height:${5+Math.random()*7}px;background:${colors[i%colors.length]};--dx:${Math.cos(a)*d}px;--dy:${Math.sin(a)*d}px`;
    document.body.appendChild(el);setTimeout(()=>el.remove(),820);
  }
}

function speedDashes(){
  const r=ball.getBoundingClientRect();
  const cx=r.left+r.width/2,cy=r.top+r.height/2;
  for(let i=0;i<5;i++){
    const el=document.createElement('div');el.className='sdash';
    const w=14+Math.random()*16;
    el.style.cssText=`position:fixed;left:${cx}px;top:${cy+ (i-2)*9}px;width:${w}px;height:5px;z-index:8;background:#fff;border-radius:100px;opacity:.85`;
    document.body.appendChild(el);
    requestAnimationFrame(()=>{el.style.transition='all .3s ease-out';el.style.left=(cx-50-Math.random()*30)+'px';el.style.opacity='0';});
    setTimeout(()=>el.remove(),340);
  }
}

/* Result: 골인 → 경품 추첨 + 기록 저장 */
function result(zone){
  confetti(80);setTimeout(()=>confetti(50),420);
  const p=drawPrize();
  const rec={e:p.e,n:p.n,g:p.g,t:Date.now(),c:mkCode()};
  if(!PLAY_TEST){
    try{localStorage.setItem(PKEY,JSON.stringify(rec));}catch(e){}
    LOCKED=true;
  }
  fillCard(rec,false);
  dim.classList.add('on');card.classList.add('up');
}

function fillCard(rec,isRevisit){
  document.getElementById('cardTitle').innerHTML=isRevisit
    ?'참여 완료! <span class="hl">당첨 확인</span> ✅'
    :'GOAL! <span class="hl">당첨을 축하합니다!</span> 🎉';
  document.getElementById('prizeBox').style.display='block';
  document.getElementById('cardEmoji').textContent=rec.e;
  document.getElementById('prizeName').textContent=rec.n;
  document.getElementById('prizeGrade').textContent=rec.g;
  document.getElementById('prizeMeta').textContent=`당첨번호 ${rec.c} · ${fmtT(rec.t)} · 상품 구성 예시`;
  document.getElementById('cardMsg').innerHTML=isRevisit
    ?'이미 참여하신 기록이에요.<br>아직 경품을 안 받으셨다면 지금 받아가세요!'
    :'완벽한 슈팅! 오늘 대한민국도 골 폭죽 🇰🇷';
  document.getElementById('cardHumor').textContent='참가비는 무료지만… 인간적으로 뭐 하나는 사주실 거죠? 🥹🛒';
  const staff=document.getElementById('staffNote');
  const btn=document.getElementById('btn-retry');
  if(PLAY_TEST){staff.style.display='none';btn.style.display='block';btn.textContent='한번 더 테스트 🔁';}
  else{staff.style.display='block';btn.style.display='none';}
}

/* Confetti */
function confetti(n){
  const C=['#FFD700','#FF6B35','#4ECDC4','#45B7D1','#A8E063','#FFEAA7','#e8443a','#3b6fd4','#fff'];
  for(let i=0;i<n;i++){
    const sz=7+Math.random()*9;
    const el=document.createElement('div');el.className='conf';
    el.style.cssText=`left:${Math.random()*100}%;width:${sz}px;height:${sz*1.4}px;background:${C[i%C.length]};border-radius:${Math.random()>.5?'50%':'2px'};animation-duration:${2+Math.random()*1.6}s;animation-delay:${Math.random()*.5}s`;
    confEl.appendChild(el);
  }
  setTimeout(()=>{confEl.innerHTML='';},4800);
}

/* Reset (테스트 모드 전용) */
function reset(){
  card.classList.remove('up');dim.classList.remove('on');
  confEl.innerHTML='';
  goalText.classList.remove('show');
  if(window.__netBall){window.__netBall.remove();window.__netBall=null;}
  keeperEl.style.transition='none';
  keeperEl.style.left='50%';keeperEl.style.bottom='2%';keeperEl.style.transform='translateX(-50%)';
  keeperShadow.style.left='50%';keeperShadow.style.opacity='.16';
  requestAnimationFrame(()=>{keeperEl.style.transition='left .32s cubic-bezier(.34,1.3,.5,1),bottom .32s cubic-bezier(.34,1.3,.5,1),transform .32s cubic-bezier(.34,1.3,.5,1)';});
  ball.style.opacity='1';ball.style.transition='none';ball.style.transform='translate(-50%,-50%)';
  requestAnimationFrame(()=>ball.classList.add('glow'));
  inst.textContent=INST_TXT;
  clearZone();hideDots();shooting=dragOn=false;
}
</script>

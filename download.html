<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>포스터 다운로드 | 여수식자재마트 어항단지점</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  body{font-family:-apple-system,'Apple SD Gothic Neo','Noto Sans KR',sans-serif;
    background:linear-gradient(170deg,#dcf6e4 0%,#aae9c0 100%);min-height:100vh;
    display:flex;flex-direction:column;align-items:center;padding:32px 20px 48px;color:#222}
  .badge{display:inline-flex;align-items:center;gap:6px;background:rgba(255,255,255,.65);border:2px solid rgba(43,43,43,.1);border-radius:100px;padding:6px 16px;font-size:.85rem;font-weight:800;color:#2b6b3a;margin-bottom:12px}
  h1{font-size:1.5rem;font-weight:900;text-align:center;margin-bottom:4px}
  .sub{font-size:.95rem;font-weight:700;color:#3a3a3a;text-align:center;margin-bottom:24px}
  .preview{width:min(330px,82vw);border-radius:14px;overflow:hidden;box-shadow:0 10px 30px rgba(0,0,0,.18);margin-bottom:26px;background:#fff}
  .preview img{width:100%;display:block}
  .btns{width:min(420px,90vw);display:flex;flex-direction:column;gap:14px}
  .btn{display:flex;align-items:center;justify-content:center;gap:10px;text-decoration:none;
    border-radius:16px;padding:18px;font-size:1.1rem;font-weight:800;cursor:pointer;
    box-shadow:0 6px 16px rgba(0,0,0,.15);transition:transform .1s}
  .btn:active{transform:scale(.97)}
  .btn-pdf{background:#222;color:#fff}
  .btn-png{background:#fb8c2a;color:#fff}
  .btn small{font-weight:600;opacity:.8;font-size:.8rem}
  .note{margin-top:24px;max-width:420px;font-size:.86rem;font-weight:600;color:#3a6b48;line-height:1.7;text-align:center}
  .play{margin-top:20px;font-size:.9rem}
  .play a{color:#1d6f3a;font-weight:800}
</style>
</head>
<body>
  <span class="badge">🇰🇷 대한민국 승리 기원 이벤트</span>
  <h1>행사 포스터 다운로드</h1>
  <div class="sub">여수식자재마트 어항단지점</div>

  <div class="preview"><img src="poster.png" alt="이벤트 포스터 미리보기"></div>

  <div class="btns">
    <a class="btn btn-pdf" href="poster.pdf" download="여수식자재마트_축구이벤트_포스터.pdf">
      🖨️ PDF 다운로드 <small>(인쇄용 · A4)</small>
    </a>
    <a class="btn btn-png" href="poster.png" download="여수식자재마트_축구이벤트_포스터.png">
      🖼️ 이미지 다운로드 <small>(PNG · SNS·메신저용)</small>
    </a>
  </div>

  <div class="note">
    💡 <b>인쇄소·복사집</b>에 맡길 땐 <b>PDF</b>가 가장 깔끔해요.<br>
    카톡·인스타 등에 올릴 땐 <b>PNG</b>를 쓰세요.<br>
    폰에서 버튼이 안 받아지면, 이미지를 <b>꾹 눌러 저장</b>하셔도 됩니다.
  </div>

  <div class="play">▶ 게임 직접 해보기: <a href="./">여수식자재마트 패널티킥</a></div>
</body>
</html>
